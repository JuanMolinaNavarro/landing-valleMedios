name: vallemedios

services:
  backend:
    container_name: vallemedios-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      NODE_ENV: production
      PORT: 3001
      PUPPETEER_NO_SANDBOX: ${PUPPETEER_NO_SANDBOX:-true}
    expose:
      - "3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal

  frontend:
    container_name: vallemedios-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE: ${PUBLIC_API_BASE:-/api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
    expose:
      - "4321"
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    container_name: vallemedios-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge
